<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sample Product Reviews</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Demo Headphones",
        "review": [
          {
            "@type": "Review",
            "author": { "@type": "Person", "name": "Alice" },
            "name": "Very solid everyday item",
            "reviewBody": "I used this product for two weeks and it works as expected. Build quality is solid and the setup was simple.",
            "datePublished": "2026-03-10",
            "reviewRating": { "@type": "Rating", "ratingValue": "4.0" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <section class="review-list">
      <article class="review-item">
        <h3 class="review-title">Best purchase ever</h3>
        <div class="author">Bob</div>
        <div class="rating">5.0 out of 5 stars</div>
        <time>2026-03-11</time>
        <p class="review-text">Absolutely amazing!!! Best purchase ever!!! Everyone must buy this right now!!!</p>
      </article>
    </section>
  </body>
</html>
